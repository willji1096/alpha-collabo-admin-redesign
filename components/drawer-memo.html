<!-- Memo Drawer — 관리메모 편집/생성. 사이드바 [관리메모] 카드 클릭 또는 신규(+) 트리거 -->
<div class="drawer-backdrop js-memo-backdrop" hidden></div>
<aside class="drawer drawer-memo js-memo-drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-memo-title" hidden>

  <div class="drawer-header">
    <div class="dm-head">
      <h2 class="drawer-title" id="drawer-memo-title">메모 편집</h2>
      <span class="dm-meta" data-memo-meta>저장 전</span>
    </div>
    <div class="dm-head-actions">
      <button class="dm-pin-btn" type="button" data-memo-pin aria-pressed="false" aria-label="핀 고정 토글">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 17v5"/><path d="M9 10.76V6h6v4.76l3 3.24v3H6v-3z"/>
        </svg>
      </button>
      <button class="modal-close js-close-memo" aria-label="닫기" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M6 6L18 18M18 6L6 18"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="drawer-body">
    <input class="dm-title-input" type="text" placeholder="제목 (예: #1769756657 배송 URL 재확인)" data-memo-title maxlength="80">
    <textarea class="dm-body-input" placeholder="본문을 작성하세요. 체크리스트는 [ ] 로 시작하세요." data-memo-body></textarea>

    <div class="dm-tags-section">
      <div class="dm-tags-head">
        <span class="dm-section-label">태그</span>
        <span class="dm-section-hint">엔터/쉼표로 추가 · 백스페이스로 삭제</span>
      </div>
      <div class="dm-tags" data-memo-tags>
        <input class="dm-tag-input" type="text" placeholder="태그 입력…" data-memo-tag-input maxlength="20" aria-label="태그 추가">
      </div>
    </div>
  </div>

  <div class="drawer-footer dm-footer">
    <button class="dm-delete-btn" type="button" data-memo-delete>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      <span>삭제</span>
    </button>
    <div class="dm-footer-right">
      <button class="btn btn-secondary btn-md js-close-memo" type="button">취소</button>
      <button class="btn btn-primary btn-md" type="button" data-memo-save>저장</button>
    </div>
  </div>

</aside>
