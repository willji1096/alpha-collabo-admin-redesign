<!-- Confirm Modal — 파괴적/비가역 액션 확인 전용. window.showConfirm(opts)로 호출 -->
<div class="modal-backdrop js-confirm-backdrop" hidden>
  <div class="modal modal-confirm" role="alertdialog" aria-modal="true" aria-labelledby="modal-confirm-title" aria-describedby="modal-confirm-desc">
    <div class="modal-confirm-icon" data-confirm-icon>
      <svg data-icon="warning" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <svg data-icon="danger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
      </svg>
      <svg data-icon="info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
      <svg data-icon="success" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2 class="modal-confirm-title" id="modal-confirm-title" data-confirm-title>작업을 진행하시겠습니까?</h2>
    <p class="modal-confirm-desc" id="modal-confirm-desc" data-confirm-desc></p>
    <div class="modal-confirm-actions">
      <button type="button" class="btn btn-secondary btn-md js-confirm-cancel" data-confirm-cancel>취소</button>
      <button type="button" class="btn btn-primary btn-md js-confirm-ok" data-confirm-ok>확인</button>
    </div>
  </div>
</div>
