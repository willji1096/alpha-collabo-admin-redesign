<div class="modal-backdrop js-message-backdrop" hidden>
<div class="modal modal-message" role="dialog" aria-modal="true" aria-labelledby="modal-message-title">

  <div class="modal-header">
    <h2 class="modal-title" id="modal-message-title">메시지함</h2>
    <button class="modal-close js-close-message" aria-label="닫기">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M4.5 4.5L13.5 13.5M13.5 4.5L4.5 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="modal-body">

    <div class="tabs mm-tabs" role="tablist" aria-label="메시지 탭">
      <button class="tab is-active" role="tab" data-msg="inbox" aria-selected="true">받은 메시지</button>
      <button class="tab" role="tab" data-msg="sent" aria-selected="false">보낸 메시지</button>
    </div>

    <!-- 받은 메시지 + 새 메시지 작성 -->
    <div data-msg-panel="inbox">
      <ul class="mm-list">
        <li class="mm-item">
          <div class="mm-item-head">
            <span class="mm-item-from" data-message-recipient>mika_seoul</span>
            <span class="mm-item-time">2시간 전</span>
          </div>
          <p class="mm-item-text">안녕하세요! 방문 일정 확정 부탁드립니다.</p>
        </li>
        <li class="mm-item">
          <div class="mm-item-head">
            <span class="mm-item-from" data-message-recipient>mika_seoul</span>
            <span class="mm-item-time">어제</span>
          </div>
          <p class="mm-item-text">캠페인 관련 문의드립니다. 리뷰 제출 마감이 언제인가요?</p>
        </li>
      </ul>

      <form class="mm-form" onsubmit="return false;">
        <div class="mm-field">
          <label class="mm-label" for="mm-recipient">받는 사람</label>
          <input class="mm-input is-readonly" id="mm-recipient" type="text" value="mika_seoul" data-message-recipient readonly>
        </div>
        <div class="mm-field">
          <label class="mm-label" for="mm-content">내용</label>
          <textarea class="mm-textarea" id="mm-content" rows="6" placeholder="메시지를 입력하세요"></textarea>
          <div class="mm-charcount"><span data-message-count>0</span> / 1000</div>
        </div>
        <div class="mm-actions">
          <button type="button" class="btn btn-ghost btn-sm js-close-message">취소</button>
          <button type="submit" class="btn btn-primary btn-sm js-send-message">메시지 발송</button>
        </div>
      </form>
    </div>

    <!-- 보낸 메시지 -->
    <div data-msg-panel="sent" hidden>
      <ul class="mm-list">
        <li class="mm-item">
          <div class="mm-item-head">
            <span class="mm-item-from">→ <span data-message-recipient>mika_seoul</span></span>
            <span class="mm-item-time">30분 전</span>
            <span class="badge badge-success badge-sm"><span class="badge-dot"></span>읽음</span>
          </div>
          <p class="mm-item-text">캠페인 신청 확인되었습니다. 추가 안내 드리겠습니다.</p>
        </li>
        <li class="mm-item">
          <div class="mm-item-head">
            <span class="mm-item-from">→ <span data-message-recipient>mika_seoul</span></span>
            <span class="mm-item-time">3일 전</span>
            <span class="badge badge-info badge-sm badge-outline"><span class="badge-dot"></span>미확인</span>
          </div>
          <p class="mm-item-text">리뷰 제출 부탁드립니다.</p>
        </li>
      </ul>
    </div>

  </div>

</div>
</div>
