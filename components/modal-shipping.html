<!-- Shipping Modal — 배송정보 입력. window.showShipping()로 호출 or .js-open-shipping 버튼 자동 연결 -->
<div class="modal-backdrop js-shipping-backdrop" hidden>
<div class="modal modal-shipping" role="dialog" aria-modal="true" aria-labelledby="modal-shipping-title">

  <div class="modal-header">
    <h2 class="modal-title" id="modal-shipping-title">배송정보 입력</h2>
    <button class="modal-close js-close-shipping" aria-label="닫기" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <path d="M6 6L18 18M18 6L6 18"/>
      </svg>
    </button>
  </div>

  <div class="modal-body">

    <!-- Context -->
    <div class="ms-hint">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
      <span>저장 시 인플루언서에게 <strong>배송 시작 알림</strong>이 자동 발송됩니다.</span>
    </div>

    <!-- Recipient (간결 요약) -->
    <div class="ms-recipient">
      <div class="ms-recipient-label">수령 인플루언서</div>
      <div class="ms-recipient-name">
        <span data-shipping-recipient-name>mika_seoul</span>
        <span class="c-country-code" data-shipping-recipient-country>CN</span>
      </div>
      <div class="ms-recipient-sub" data-shipping-recipient-sub>겨울 뷰티 리뷰 캠페인 · 1771914476</div>
    </div>

    <!-- Form -->
    <div class="ms-form">
      <div class="ms-field">
        <label class="ms-label" for="ms-carrier">택배사 <span class="ms-required" aria-hidden="true">*</span></label>
        <div class="ms-select-wrap">
          <select class="ms-select" id="ms-carrier" required>
            <option value="" disabled selected>택배사를 선택하세요</option>
            <option value="cj">CJ대한통운</option>
            <option value="lotte">롯데택배</option>
            <option value="hanjin">한진택배</option>
            <option value="logen">로젠택배</option>
            <option value="epost">우체국택배</option>
            <option value="cupost">CU편의점택배</option>
            <option value="gspost">GS편의점택배</option>
            <option value="dhl">DHL</option>
            <option value="fedex">FedEx</option>
            <option value="ems">EMS</option>
            <option value="other">기타 직접 입력</option>
          </select>
          <svg class="ms-select-caret" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <div class="ms-field ms-field-other" hidden>
        <label class="ms-label" for="ms-carrier-other">택배사명 직접 입력 <span class="ms-required" aria-hidden="true">*</span></label>
        <input class="ms-input" id="ms-carrier-other" type="text" placeholder="예: DHL Express, 바로택배">
      </div>

      <div class="ms-field">
        <label class="ms-label" for="ms-tracking">송장번호 <span class="ms-required" aria-hidden="true">*</span></label>
        <input class="ms-input is-mono" id="ms-tracking" type="text" inputmode="numeric" placeholder="숫자만 입력 · 예: 617512340987" required>
        <p class="ms-field-help">공백·하이픈 없이 숫자만 입력해주세요.</p>
      </div>
    </div>

  </div>

  <div class="modal-footer">
    <div class="ms-footer-note">
      <span class="ms-required" aria-hidden="true">*</span> 필수 입력
    </div>
    <div class="ms-footer-actions">
      <button type="button" class="btn btn-secondary btn-md js-close-shipping">취소</button>
      <button type="button" class="btn btn-primary btn-md js-save-shipping">저장</button>
    </div>
  </div>

</div>
</div>
