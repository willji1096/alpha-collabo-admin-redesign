<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alphacollabo Admin — 인플루언서 취소 목록</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body data-active-tab="신청서관리">
<div class="layout">

<div id="sidebar-slot"></div>
<div id="header-slot"></div>

<main class="main">
  <div class="page">

    <div class="pg-header">
      <h1 class="pg-title">인플루언서 취소 목록</h1>
      <div class="pg-crumb">신청서관리 / 리뷰취소·미선정관리 / <b>인플루언서 취소 목록</b></div>
    </div>

    <div class="chip-bar">
      <div class="chip-bar-summary">
        <span class="f-summary-label">현재 조건</span>
        취소일자 <strong>전체</strong>
      </div>
      <div class="chip-bar-right">
        <button class="btn btn-sm btn-secondary btn-icon" onclick="document.getElementById('page-filters').classList.toggle('expanded')" aria-label="전체 필터" title="전체 필터">
          <svg width="14" height="14" viewBox="0 0 24 24" class="icon-stroke"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        </button>
      </div>
    </div>

    <div class="filters collapsible" id="page-filters">
      <div class="f-row">
        <span class="f-label">캠페인</span>
        <div class="f-body">
          <select class="f-sel" style="width:150px"><option>캠페인</option></select>
          <span class="f-label" style="margin-left:16px; width:auto">접속기기</span>
          <label class="f-radio"><input type="radio" name="dv" checked> 전체</label>
          <label class="f-radio"><input type="radio" name="dv"> PC</label>
          <label class="f-radio"><input type="radio" name="dv"> 모바일</label>
        </div>
      </div>
      <div class="f-row">
        <span class="f-label">검색어</span>
        <div class="f-body">
          <select class="f-sel" style="width:110px"><option>검색 항목</option></select>
          <input class="f-input" style="width:200px" placeholder="검색어 입력">
          <span class="f-charcount">0/30</span>
        </div>
      </div>
      <div class="f-row">
        <span class="f-label">기간검색</span>
        <div class="f-body">
          <select class="f-sel" style="width:120px"><option>취소일자</option></select>
          <input class="f-input" style="width:120px" placeholder="2026-01-01">
          <span class="f-sep">~</span>
          <input class="f-input" style="width:120px" placeholder="2026-04-17">
          <div class="f-presets">
            <button class="f-pre on">전체</button>
            <button class="f-pre">오늘</button>
            <button class="f-pre">7일</button>
            <button class="f-pre">15일</button>
            <button class="f-pre">1개월</button>
            <button class="f-pre">3개월</button>
          </div>
        </div>
      </div>
      <div class="f-row">
        <span class="f-label">국가 필터</span>
        <div class="f-body">
          <label class="checkbox-label"><input class="checkbox-input" type="checkbox"> 국가별 필터 사용</label>
        </div>
      </div>
      <div class="f-actions">
        <button class="btn btn-primary btn-sm">검색하기</button>
        <button class="btn btn-ghost btn-sm">엑셀다운</button>
      </div>
    </div>

    <div class="t-toolbar">
      <div class="t-count">전체 <strong>0</strong>건 / 검색 <strong>0</strong>건</div>
      <div class="t-right">
        <select class="t-sel"><option>취소일자 내림차순정렬</option></select>
        <select class="t-sel"><option>페이지당 15개 표시</option></select>
      </div>
    </div>

    <div class="tbl-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th class="c-chk"><input class="checkbox-input" type="checkbox"></th>
            <th class="sortable">국가</th>
            <th class="sortable">취소일시</th>
            <th class="sortable">신청번호</th>
            <th class="sortable">캠페인명/코드</th>
            <th>회원정보</th>
            <th>인플루언서</th>
          </tr>
        </thead>
        <tbody>
          <tr class="empty-row">
            <td colspan="7">
              <div class="empty-state">
                <div class="empty-state-icon">
                  <svg width="24" height="24" viewBox="0 0 24 24" class="icon-stroke" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M18 8l4 4m0-4l-4 4"/></svg>
                </div>
                <div class="empty-state-title">취소한 인플루언서가 없습니다</div>
                <div class="empty-state-desc">기간·캠페인 필터를 조정해 보세요.</div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</main>

</div>
<script src="js/components.js"></script>
</body>
</html>
