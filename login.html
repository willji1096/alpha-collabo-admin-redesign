<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alphacollabo Admin — 로그인</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
<style>
  body { background: var(--bg-surface); }

  /* ========== Header ========== */
  .login-header-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: var(--bg-surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 10;
  }

  .header-logo svg {
    height: 40px;
    width: auto;
    display: block;
  }

  .header-lang {
    font-size: 13px;
    color: var(--text-tertiary);
    text-decoration: none;
    cursor: pointer;
  }

  /* ========== Main Layout ========== */
  .login-page {
    display: flex;
    min-height: 100vh;
    padding-top: 64px;
  }

  /* ===== Left: Visual ===== */
  .login-visual-side {
    width: 50%;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #F0EBE5 0%, #E8E1D9 100%);
  }

  .visual-photo {
    position: absolute;
    inset: 0;
    background: url('images/login-photo.png') center center / cover no-repeat;
  }

  .visual-photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(238,33,40,0.05) 0%, transparent 55%),
      linear-gradient(to bottom, rgba(0,0,0,0) 55%, rgba(17,17,17,0.22) 100%);
  }

  .visual-tagline {
    position: absolute;
    left: 48px;
    bottom: 56px;
    right: 48px;
    color: #FFFFFF;
    z-index: 2;
  }
  .visual-tagline strong {
    display: block;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.4px;
    margin-bottom: 10px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.35);
  }
  .visual-tagline span {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.6;
    opacity: 0.9;
    text-shadow: 0 1px 8px rgba(0,0,0,0.35);
  }

  /* ===== Right: Form ===== */
  .login-form-side {
    width: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 64px 80px;
  }

  .login-container {
    width: 100%;
    max-width: 400px;
  }

  .login-header {
    margin-bottom: 40px;
  }

  .login-title {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.35;
    letter-spacing: -0.3px;
    color: var(--text-primary);
    margin-bottom: 12px;
  }

  .login-subtitle {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--text-tertiary);
  }

  /* Form — 로그인 전용 오버라이드 */
  .login-container .form-label {
    font-size: 14px;
    color: var(--text-primary);
  }

  .login-container .form-input {
    height: 48px;
    padding: 0 16px;
  }

  .login-container .form-input.has-toggle { padding-right: 48px; }

  .password-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color var(--transition);
  }
  .password-toggle:hover { color: var(--text-secondary); }

  .login-error-alert {
    margin-bottom: 24px;
  }

  .form-options {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
  }

  /* Login Button — 브랜드 레드 */
  .login-button {
    width: 100%;
    height: 48px;
    background: var(--accent);
    color: #FFFFFF;
    border: none;
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.1px;
    cursor: pointer;
    transition: all var(--transition);
  }
  .login-button:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(238,33,40,0.22);
  }
  .login-button:active {
    transform: translateY(0) scale(0.99);
    box-shadow: none;
  }
  .login-button:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--accent-light), 0 6px 16px rgba(238,33,40,0.22);
  }

  .login-footer {
    margin-top: 48px;
  }
  .login-footer p {
    font-size: 12px;
    color: var(--text-disabled);
  }

  /* ========== Responsive ========== */
  @media (max-width: 1024px) {
    .login-form-side { padding: 48px 48px; }
  }

  @media (max-width: 768px) {
    .login-visual-side { display: none; }
    .login-form-side { width: 100%; padding: 48px 24px; }
  }
</style>
</head>

<div class="login-page">

  <!-- Left: Visual -->
  <div class="login-visual-side" aria-hidden="true">
    <div class="visual-photo"></div>
    <div class="visual-tagline">
      <strong>글로벌 인플루언서와<br>직접 연결하세요</strong>
      <span>11개국 12,400명의 크리에이터 네트워크</span>
    </div>
  </div>

  <!-- Right: Form -->
  <div class="login-form-side">
    <div class="login-container">
      <div class="login-header">
        <h2 class="login-title">알파콜라보 어드민에<br>로그인하세요</h2>
        <p class="login-subtitle">인플루언서 캠페인 관리를 시작합니다.</p>
      </div>

      <div class="alert alert-error login-error-alert" style="display:flex">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 4.5V8.5M8 10.5V11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p>아이디 또는 비밀번호가 올바르지 않습니다.</p>
      </div>

      <form action="dashboard.html" method="get" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
        <div class="form-group">
          <label class="form-label" for="username">아이디</label>
          <div class="input-wrapper">
            <input class="form-input" type="text" id="username" placeholder="관리자 아이디를 입력하세요" value="milla_company">
          </div>
        </div>

        <div class="form-group has-error">
          <label class="form-label" for="password">비밀번호</label>
          <div class="input-wrapper">
            <input class="form-input has-toggle" type="password" id="password" placeholder="비밀번호를 입력하세요">
            <button type="button" class="password-toggle" aria-label="비밀번호 보기">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M1.5 9C1.5 9 4 3.75 9 3.75C14 3.75 16.5 9 16.5 9C16.5 9 14 14.25 9 14.25C4 14.25 1.5 9 1.5 9Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="9" cy="9" r="2.25" stroke="currentColor" stroke-width="1.4"/>
              </svg>
            </button>
          </div>
          <p class="form-error">비밀번호를 입력해 주세요.</p>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input class="checkbox-input" type="checkbox" checked>
            아이디 저장
          </label>
          <label class="checkbox-label">
            <input class="checkbox-input" type="checkbox">
            자동로그인
          </label>
        </div>

        <button type="submit" class="login-button">로그인</button>
      </form>

      <div class="login-footer">
        <p>Copyright &copy; 2026 Alphacollabo. All Rights Reserved.</p>
      </div>
    </div>
  </div>
</div>

</body>
</html>
