<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alphacollabo Admin — 리뷰 신청자 정보</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
<style>
  /* 모달 컨테이너/애니메이션/대부분의 스타일은 common.css의 .modal 사용 */
  body {
    background: transparent;
    display: block;
    padding: 0;
  }

  .modal {
    /* common.css의 .modal 상속. 개별 오버라이드만 */
    max-width: 680px;
  }
  .modal-body { padding: 24px 28px; }
  .modal-header { padding: 20px 28px; }
  .modal-footer { padding: 16px 28px; }

  /* 섹션 구분 */
  .info-section { margin-bottom: 28px; }
  .info-section:last-child { margin-bottom: 0; }

  .info-section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .info-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-light);
  }

  /* 2컬럼 그리드 */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 32px;
  }

  .info-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .info-item.full { grid-column: 1 / -1; }

  .info-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 0.1px;
  }

  .info-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.5;
    font-variant-numeric: tabular-nums;
  }

  .info-value.empty {
    color: var(--text-disabled);
    font-weight: 400;
  }

  /* 시술목록 박스 */
  .info-empty-box {
    padding: 14px 16px;
    background: var(--bg-page);
    border: 1px dashed var(--border-default);
    border-radius: var(--radius-md);
    font-size: 13px;
    color: var(--text-tertiary);
    text-align: center;
  }

  /* 방문일정 */
  .visit-list { display: flex; flex-direction: column; gap: 10px; }
  .visit-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg-page);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    font-size: 14px;
  }
  .visit-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-tertiary);
    width: 76px;
    flex-shrink: 0;
  }
  .visit-value { color: var(--text-primary); font-variant-numeric: tabular-nums; }
  .visit-value.empty { color: var(--text-disabled); }

  @media (max-width: 640px) {
    .info-grid { grid-template-columns: 1fr; gap: 14px; }
    .modal-header, .modal-body, .modal-footer { padding-left: 20px; padding-right: 20px; }
  }
</style>
</head>
<body>

<!-- 모달은 보통 페이지 내부에서 렌더됨. 단독 프리뷰 용도 배경 -->
<div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
<div class="modal">
  <div class="modal-header">
    <h2 class="modal-title" id="modal-title">지원자 상세 정보</h2>
    <button class="modal-close" aria-label="닫기">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M4.5 4.5L13.5 13.5M13.5 4.5L4.5 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>

  <div class="modal-body">
    <!-- 기본 정보 -->
    <section class="info-section">
      <h3 class="info-section-title">기본 정보</h3>
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">이름</span>
          <span class="info-value">김민지</span>
        </div>
        <div class="info-item">
          <span class="info-label">연락처</span>
          <span class="info-value">+82 10-4721-8294</span>
        </div>
        <div class="info-item">
          <span class="info-label">생년월일</span>
          <span class="info-value">1997-06-14</span>
        </div>
        <div class="info-item">
          <span class="info-label">가능 언어</span>
          <span class="info-value">한국어 · 일본어 (N2)</span>
        </div>
      </div>
    </section>

    <!-- 캠페인 정보 -->
    <section class="info-section">
      <h3 class="info-section-title">캠페인 정보</h3>
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">원하는 시술</span>
          <span class="info-value">프락셀 레이저</span>
        </div>
        <div class="info-item">
          <span class="info-label">한국 체류 기간</span>
          <span class="info-value">2026-03-18 ~ 2026-03-24</span>
        </div>
        <div class="info-item">
          <span class="info-label">통역 필요 여부</span>
          <span class="info-value">필요 없음</span>
        </div>
        <div class="info-item full">
          <span class="info-label">캠페인 시술목록</span>
          <div class="info-empty-box">등록된 시술목록이 없습니다.</div>
        </div>
      </div>
    </section>

    <!-- 방문 일정 -->
    <section class="info-section">
      <h3 class="info-section-title">방문 일정</h3>
      <div class="visit-list">
        <div class="visit-item">
          <span class="visit-label">1순위</span>
          <span class="visit-value">2026-03-19 (목) · 오후 2:00</span>
        </div>
        <div class="visit-item">
          <span class="visit-label">2순위</span>
          <span class="visit-value">2026-03-20 (금) · 오전 11:00</span>
        </div>
        <div class="visit-item">
          <span class="visit-label">3순위</span>
          <span class="visit-value empty">미선택</span>
        </div>
      </div>
    </section>
  </div>

  <div class="modal-footer">
    <button class="btn btn-ghost btn-sm">닫기</button>
    <button class="btn btn-danger btn-sm">거절</button>
    <button class="btn btn-primary btn-sm">채택</button>
  </div>
</div>
</div>

</body>
</html>
