<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alphacollabo Admin — 계정 및 댓글 관리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body data-active-tab="요금표">
<div class="layout">

<div id="sidebar-slot"></div>
<div id="header-slot"></div>

<main class="main">
  <div class="page">

    <div class="pg-header">
      <h1 class="pg-title">계정 및 댓글 관리</h1>
      <div class="pg-crumb">요금표 &gt; 요금관리 &gt; <b>계정 및 댓글 관리</b></div>
    </div>

    <div class="price-info">
      현재적용 요금 · 2025-04-09 15:16:50 기준

    <div class="price-section">
      <table class="price-tbl">
        <thead>
          <tr>
            <th></th>
            <th>계정관리</th>
            <th>댓글관리</th>
            <th>게시글 공동 게재</th>

        </thead>
        <tbody>
          <tr>
            <td class="row-label">계정관리</td>
            <td>80만원/월</td>
            <td>60만원/월</td>

          </tr>
        </tbody>
      </table>
      <p class="text-small text-tertiary" style="margin-top:var(--space-3)">※ VAT 별도</p>
    </div>
  </div>
</main>

</div>
<script src="js/components.js"></script>
