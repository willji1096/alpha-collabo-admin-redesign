<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alphacollabo Admin — 통역</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/admin.css">
<style>
  .price-info {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: 8px;
  }

  .price-section {
    margin-bottom: 28px;
  }

  .price-section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-default);
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.1px;
  }
  .price-section-title::before {
    content: '';
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }
  .price-section-title .country-code {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 32px;
    height: 22px;
    padding: 0 8px;
    background: var(--bg-elevated);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
    border-radius: var(--radius-sm);
    margin-left: auto;
  }

  .price-tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: 8px;
    overflow: hidden;
  }

  .price-tbl th {
    background: var(--bg-elevated);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-align: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-default);
    border-right: 1px solid var(--border-default);
    white-space: nowrap;
  }
  .price-tbl th:last-child { border-right: none; }

  .price-tbl td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-default);
    border-right: 1px solid var(--border-default);
    text-align: center;
    vertical-align: middle;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
  }
  .price-tbl td:last-child { border-right: none; }
  .price-tbl tbody tr:last-child td { border-bottom: none; }
  .price-tbl tbody tr:hover { background: var(--bg-hover); }

  .price-tbl .row-label {
    text-align: left;
    font-weight: 500;
    background: var(--bg-page);
    white-space: nowrap;
  }

  .price-tbl .total-row td {
    font-weight: 700;
    background: var(--bg-elevated);
    border-top: 1px solid var(--border-default);
  }
</style>
</head>
<body data-active-tab="요금표">
<div class="layout">

<div id="sidebar-slot"></div>
<div id="header-slot"></div>

<main class="main">
  <div class="page">

    <div class="pg-header">
      <h1 class="pg-title">통역</h1>
      <div class="pg-crumb">요금표 &gt; 요금관리 &gt; <b>통역</b></div>
    </div>

    <div class="price-info">
      현재적용 요금 · 2025-04-09 15:16:50 기준
    </div>

    <div class="price-section">
      <table class="price-tbl">
        <thead>
          <tr>
            <th></th>
            <th>통역비</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="row-label">기본 추가금</td>
            <td>건당 12만원 (3시간) 초과시 시간당 5만원</td>
          </tr>
        </tbody>
      </table>
      <p class="text-small text-tertiary" style="margin-top:var(--space-3)">※ 서울지역만 지원가능 시간단위 계산</p>
    </div>
  </div>
</main>

</div>
<script src="js/components.js"></script>
</body>
</html>
