<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — Alphacollabo</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<style>
  body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 100vh;
  }
  @media (max-width: 880px) { body { grid-template-columns: 1fr; } }

  .login-visual {
    background: linear-gradient(160deg, var(--wine-700) 0%, var(--wine-500) 60%, var(--wine-400) 100%);
    color: var(--on-accent);
    padding: var(--space-9) var(--space-9);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    position: relative;
  }
  @media (max-width: 880px) { .login-visual { display: none; } }

  .lv-deco {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 20% 100%, rgba(255,255,255,0.10), transparent 50%),
      radial-gradient(circle at 80% 0%, rgba(255,255,255,0.08), transparent 50%);
  }
  .lv-mark {
    width: 44px; height: 44px;
    border-radius: var(--radius-md);
    background: rgba(255,255,255,0.16);
    backdrop-filter: blur(6px);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-serif);
    font-size: var(--fs-lg);
    font-weight: var(--fw-semibold);
    letter-spacing: -0.04em;
    position: relative;
    z-index: 1;
  }
  .lv-quote {
    font-family: var(--font-serif);
    font-size: var(--fs-2xl);
    font-weight: var(--fw-semibold);
    line-height: var(--lh-tight);
    letter-spacing: var(--ls-tight);
    max-width: 18ch;
    position: relative;
    z-index: 1;
  }
  .lv-quote em { font-style: normal; opacity: 0.55; }
  .lv-foot {
    display: flex; gap: var(--space-3);
    font-size: var(--fs-xs);
    letter-spacing: var(--ls-wide);
    text-transform: uppercase;
    opacity: 0.7;
    position: relative;
    z-index: 1;
  }
  .lv-foot-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.5; align-self: center; }

  .login-form {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: var(--space-9) var(--space-9);
    background: var(--bg-page);
  }
  @media (max-width: 768px) { .login-form { padding: var(--space-7) var(--space-5); } }

  .form-card {
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
  }

  .form-eyebrow {
    font-size: var(--fs-2xs);
    letter-spacing: var(--ls-wide);
    text-transform: uppercase;
    color: var(--accent);
    font-weight: var(--fw-semibold);
    margin-bottom: var(--space-3);
  }
  .form-title {
    font-family: var(--font-serif);
    font-size: var(--fs-2xl);
    font-weight: var(--fw-semibold);
    letter-spacing: var(--ls-tight);
    line-height: var(--lh-tight);
    margin-bottom: var(--space-2);
  }
  .form-sub {
    font-size: var(--fs-sm);
    color: var(--text-secondary);
    margin-bottom: var(--space-7);
    line-height: var(--lh-relaxed);
  }

  form { display: flex; flex-direction: column; gap: var(--space-4); }

  .form-foot {
    margin-top: var(--space-4);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: var(--fs-xs);
    color: var(--text-tertiary);
  }
  .form-demo {
    margin-top: var(--space-7);
    padding: var(--space-3) var(--space-4);
    background: var(--accent-light);
    border-radius: var(--radius-md);
    font-size: var(--fs-xs);
    color: var(--accent-emphasis);
    line-height: var(--lh-relaxed);
  }
  .form-demo code {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 1px 6px;
    border-radius: var(--radius-xs);
    background: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>

<div class="track-toggle" role="group" aria-label="시안 트랙 전환">
  <a class="track-btn" href="../login.html" title="V1 시안으로 전환">V1</a>
  <a class="track-btn is-active" href="login.html" aria-current="true" title="V2 시안 (현재)">V2</a>
</div>

<aside class="login-visual">
  <div class="lv-deco" aria-hidden="true"></div>
  <div class="lv-mark">α</div>
  <p class="lv-quote">
    인플루언서 매칭은<br>
    <em>직접 고르세요.</em>
  </p>
  <div class="lv-foot">
    <span>Alphacollabo</span>
    <span class="lv-foot-dot"></span>
    <span>V2 · Curated Light</span>
  </div>
</aside>

<section class="login-form">
  <div class="form-card">

    <div class="form-eyebrow">로그인</div>
    <h1 class="form-title">매칭을 시작하세요</h1>
    <p class="form-sub">기존 계정으로 로그인하거나, 운영팀에 발급 요청해 주세요.</p>

    <form id="login-form">
      <div class="field">
        <label class="field-label" for="email">이메일</label>
        <input class="input" type="email" id="email" placeholder="contact@brand.com" value="contact@glowlab.kr" autocomplete="username" required>
      </div>

      <div class="field">
        <label class="field-label" for="password">비밀번호</label>
        <input class="input" type="password" id="password" placeholder="비밀번호" autocomplete="current-password" required>
        <span class="field-hint" id="pw-hint">8자 이상, 영문·숫자·기호 혼합</span>
      </div>

      <button class="btn btn-primary btn-lg btn-block" type="submit" style="margin-top: var(--space-3);">
        로그인
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>

      <div class="form-foot">
        <label style="display:inline-flex; align-items:center; gap:6px; cursor:pointer;">
          <input type="checkbox" checked style="accent-color: var(--accent);">
          <span>로그인 상태 유지</span>
        </label>
        <a class="link" href="#" style="color: var(--accent);">비밀번호 찾기</a>
      </div>
    </form>

    <div class="form-demo">
      <strong style="font-weight: var(--fw-semibold);">데모 계정</strong>
      이메일 <code>contact@glowlab.kr</code> / 비밀번호 <code>alpha2025</code>
    </div>

  </div>
</section>

<script src="js/app.js"></script>
<script>
  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('password').value;
    if (email === 'contact@glowlab.kr' && pw === 'alpha2025') {
      try { sessionStorage.setItem('alpha-v2-auth', '1'); } catch (_) {}
      location.href = 'dashboard.html';
    } else {
      const hint = document.getElementById('pw-hint');
      hint.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
      hint.style.color = 'var(--status-danger-strong)';
      window.toast && window.toast('로그인에 실패했습니다', { role: 'alert' });
    }
  });
</script>
</body>
</html>
